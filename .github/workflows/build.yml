name: Build installers

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*', '[0-9]*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtimageformats'
          cache: true

      - name: Enable MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure & build
        shell: cmd
        run: |
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 .
          cmake --build build --config Release

      - name: Deploy Qt libraries
        shell: cmd
        run: |
          mkdir packaging\windows\dist
          copy build\appProcessLauncher.exe packaging\windows\dist\ProcessLauncher.exe
          windeployqt --qmldir qml --release --no-translations packaging\windows\dist\ProcessLauncher.exe

      - name: Show dist contents (debug)
        shell: cmd
        run: |
          echo --- dist ---
          dir packaging\windows\dist
          echo --- iss ---
          dir packaging\windows\installer.iss

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: cmd
        run: |
          iscc /O"%CD%\installer_out" "%CD%\packaging\windows\installer.iss"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ProcessLauncher-Windows-Setup
          path: installer_out\*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_out/*.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtimageformats'
          cache: true

      - name: Create stub AGL framework (fix deprecated AGL link)
        run: |
          STUB="$RUNNER_TEMP/StubFrameworks"
          mkdir -p "$STUB/AGL.framework/Versions/A"
          echo '' > "$RUNNER_TEMP/agl_stub.c"
          clang -dynamiclib -o "$STUB/AGL.framework/Versions/A/AGL" \
            -install_name "@rpath/AGL.framework/Versions/A/AGL" \
            "$RUNNER_TEMP/agl_stub.c"
          ln -sf A "$STUB/AGL.framework/Versions/Current"
          ln -sf Versions/Current/AGL "$STUB/AGL.framework/AGL"
          echo "AGL_STUB_PATH=$STUB" >> "$GITHUB_ENV"

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_EXE_LINKER_FLAGS="-F$AGL_STUB_PATH" \
            -DCMAKE_SHARED_LINKER_FLAGS="-F$AGL_STUB_PATH" \
            .
          cmake --build build

      - name: Package .dmg
        run: |
          mkdir -p dist
          cp -R build/appProcessLauncher.app dist/ProcessLauncher.app
          macdeployqt dist/ProcessLauncher.app -qmldir=qml -dmg
          mv dist/ProcessLauncher.dmg ProcessLauncher.dmg

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: ProcessLauncher-macOS-dmg
          path: ProcessLauncher.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ProcessLauncher.dmg
