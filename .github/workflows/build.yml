name: Build installers

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # ============================================================
  #  WINDOWS: exe + Inno Setup установщик (Qt 6.7 LTS, MSVC)
  # ============================================================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtimageformats'
          cache: true

      - name: Enable MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure & build
        shell: cmd
        run: |
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 .
          cmake --build build --config Release

      - name: Deploy Qt libraries
        shell: cmd
        run: |
          mkdir packaging\windows\dist
          copy build\appProcessLauncher.exe packaging\windows\dist\ProcessLauncher.exe
          windeployqt --qmldir qml --release --no-translations packaging\windows\dist\ProcessLauncher.exe

      - name: Show dist contents (debug)
        shell: cmd
        run: |
          echo --- dist ---
          dir packaging\windows\dist
          echo --- iss ---
          dir packaging\windows\installer.iss

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: cmd
        run: |
          iscc /O"%CD%\installer_out" "%CD%\packaging\windows\installer.iss"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ProcessLauncher-Windows-Setup
          path: installer_out\*.exe

  # ============================================================
  #  MACOS: .app + .dmg
  # ============================================================
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtimageformats'
          cache: true

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 .
          cmake --build build

      - name: Package .dmg
        run: |
          mkdir -p dist
          cp -R build/appProcessLauncher.app dist/ProcessLauncher.app
          macdeployqt dist/ProcessLauncher.app -qmldir=qml -dmg
          mv dist/ProcessLauncher.dmg ProcessLauncher.dmg

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: ProcessLauncher-macOS-dmg
          path: ProcessLauncher.dmg
